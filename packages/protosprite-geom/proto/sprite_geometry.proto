syntax = "proto3";
package protosprite;

// A 2D point with float precision (polygon vertices need sub-pixel accuracy
// after simplification).
message Vec2 {
  float x = 1;
  float y = 2;
}

// A single closed polygon (ordered ring of vertices).
message Polygon {
  repeated Vec2 vertices = 1;
}

// Convex decomposition of a polygon into convex parts.
message ConvexDecomposition {
  repeated Polygon components = 1;
}

// A polygon represented as indices into a vertex pool.
message IndexedPolygon {
  repeated int32 vertex_indices = 1;
}

// A de-duplicated (polygon, convex decomposition) pair stored in the shape pool.
// Vertices are referenced by index into the parent SpriteGeometryEntry.vertex_pool.
message ShapePoolEntry {
  IndexedPolygon polygon = 1;
  repeated IndexedPolygon convex_decomposition_components = 2;
}

// Traced geometry for one layer within one frame.
message FrameLayerGeometry {
  int32 layer_index = 1;

  // Fields 2 and 3 removed (previously polygons / convex_decompositions).
  // Indices into the parent SpriteGeometryEntry.shape_pool.
  repeated int32 shape_indices = 4;
}

// Composite geometry for the entire frame (all layers flattened).
// Generated on demand as an alternative to per-layer geometry.
message CompositeFrameGeometry {
  // Fields 1 and 2 removed (previously polygons / convex_decompositions).
  // Indices into the parent SpriteGeometryEntry.shape_pool.
  repeated int32 shape_indices = 3;
}

// Geometry for an entire frame.
message FrameGeometry {
  int32 frame_index = 1;
  repeated FrameLayerGeometry layers = 2;

  // Optional: unified polygon traced from the fully composited frame
  // (all layers flattened). Present only when composite tracing is requested.
  CompositeFrameGeometry composite = 3;
}

// Top-level geometry container for one sprite.
message SpriteGeometryEntry {
  string sprite_name = 1;
  repeated FrameGeometry frames = 2;

  // Simplification tolerance that was used to generate these polygons.
  float simplify_tolerance = 3;

  // De-duplicated shape pool. Frames reference shapes by index into this pool.
  repeated ShapePoolEntry shape_pool = 4;

  // De-duplicated vertex pool. ShapePoolEntry indices reference vertices here.
  repeated Vec2 vertex_pool = 5;
}

// Root message serialized into .prsg files.
message SpriteGeometry {
  repeated SpriteGeometryEntry entries = 1;

  // The .prsg can either embed the full .prs data or reference it externally.
  oneof sprite_source {
    bytes embedded_prs = 2;          // Full .prs binary embedded
    string external_prs_file = 3;    // Path/filename of a .prs file
    string external_prs_url = 4;     // URL of a .prs file
  }
}
